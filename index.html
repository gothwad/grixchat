<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="GrixChat" />
    <meta name="google-site-verification" content="W2ez42lwANlmcKz6ng6zAXdHwiwbI-h1OohQlI3mqLg" />
    <meta name="description" content="GrixChat is the next-gen secure social messaging platform. Connect with friends, share reels, use Grix AI, and experience private messaging like never before." />
    <meta name="keywords" content="GrixChat, social messaging, secure chat, Grix AI, reels, stories, private chat, social network, Gothwad Technologies" />
    <meta name="author" content="Gothwad Technologies" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://grixchat.com/" />
    <meta property="og:title" content="GrixChat | Connect, Chat & Share Securely" />
    <meta property="og:description" content="Join GrixChat for a faster, safer way to connect with your world. Features HD reels, real-time chat, and the intelligent Grix AI." />
    <meta property="og:image" content="/assets/favicon.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://grixchat.com/" />
    <meta property="twitter:title" content="GrixChat | The Future of Social Messaging" />
    <meta property="twitter:description" content="Experience the ultimate secure messaging app. Connect with friends and explore creative reels with GrixChat." />
    <meta property="twitter:image" content="/assets/favicon.png" />

    <!-- JSON-LD Structured Data for Breadcrumbs -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",
        "itemListElement": [{
          "@type": "ListItem",
          "position": 1,
          "name": "Home",
          "item": "https://grixchat.com/"
        },{
          "@type": "ListItem",
          "position": 2,
          "name": "Chats",
          "item": "https://grixchat.com/chats"
        },{
          "@type": "ListItem",
          "position": 3,
          "name": "Reels",
          "item": "https://grixchat.com/reels"
        }]
      }
    </script>
    
    <link rel="icon" type="image/png" href="/assets/favicon.png" />
    <link rel="apple-touch-icon" href="/assets/favicon.png" />
    <link rel="manifest" href="/manifest.json" crossorigin="use-credentials" />
    <title>GrixChat | The Ultimate Social Messaging App</title>
    <script>
      // Register Service Worker for PWA
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(registration => {
              console.log('SW registered: ', registration);
            })
            .catch(registrationError => {
              console.log('SW registration failed: ', registrationError);
            });
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

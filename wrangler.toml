name = "grixchat"
main = "src/server/server.ts"
compatibility_date = "2024-03-24"
compatibility_flags = ["nodejs_compat"]

# If you are using Cloudflare Pages, this file might not be needed.
# But for a Worker-based SSR or API, this is the configuration.

[vars]
NODE_ENV = "production"
APP_URL = "https://grixchat.gothwad.workers.dev"

# Add your secrets using `wrangler secret put KEY`
# VITE_FIREBASE_API_KEY
# VITE_FIREBASE_AUTH_DOMAIN
# VITE_FIREBASE_PROJECT_ID
# VITE_FIREBASE_STORAGE_BUCKET
# VITE_FIREBASE_MESSAGING_SENDER_ID
# VITE_FIREBASE_APP_ID
# FIREBASE_SERVICE_ACCOUNT
# GITHUB_CLIENT_ID
# GITHUB_CLIENT_SECRET
